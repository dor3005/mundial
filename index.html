
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/mundial/manifest.json">
<meta name="theme-color" content="#1e90ff">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fantasy WC">
<title>Fantasy World Cup 2026</title>
<style>
  :root {
    --bg:#0f1923; --bg2:#1a2636; --bg3:#243447;
    --accent:#1e90ff; --green:#00c896; --gold:#f5c842;
    --red:#e74c3c; --text:#f0f4f8; --text2:#8da3b8;
    --border:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',Arial,sans-serif;font-size:14px}
  .app{max-width:480px;margin:0 auto;padding-bottom:20px}
  .header{background:var(--bg2);padding:14px 14px 10px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .logo{font-size:26px}
  .header-title{font-size:16px;font-weight:700}
  .header-sub{font-size:11px;color:var(--text2);margin-top:1px}
  .updated{margin-right:auto;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:10px;color:var(--text2)}
  .tabs{display:flex;gap:3px;background:var(--bg3);border-radius:10px;padding:3px}
  .tab{flex:1;padding:7px 2px;text-align:center;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .2s}
  .tab.on{background:var(--accent);color:white}
  .content{padding:12px}
  .sec{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
  .mc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 13px;margin-bottom:10px}
  .mc.mine{border-color:var(--accent);border-width:1.5px;background:rgba(30,144,255,.08)}
  .mc.today-mine{border-color:var(--green);border-width:1.5px;background:rgba(0,200,150,.08)}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;margin-bottom:8px}
  .badge-blue{background:var(--accent);color:white}
  .badge-green{background:var(--green);color:white}
  .teams{display:flex;align-items:center;gap:6px}
  .tm{flex:1;text-align:center}
  .tm-nat{font-size:11px;font-weight:700;color:var(--text2)}
  .tm-name{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
  .sc{text-align:center;min-width:60px}
  .sc-num{font-size:26px;font-weight:900;color:var(--text);line-height:1}
  .sc-lbl{font-size:10px;color:var(--text2);margin-top:2px}
  .sc-time{font-size:19px;font-weight:700;color:var(--green);line-height:1}
  .sc-il{font-size:10px;color:var(--gold);font-weight:600;margin-top:2px}
  .events{border-top:1px solid var(--border);margin-top:9px;padding-top:7px}
  .ev{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:4px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .dot-g{background:var(--green)} .dot-a{background:var(--accent)} .dot-r{background:var(--red)} .dot-y{background:var(--gold)}
  .my-ps{border-top:1px solid var(--border);margin-top:8px;padding-top:7px}
  .my-p{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .gk{background:#f0c040;color:#5a3c00} .def{background:#27ae60;color:#0a3d1f} .mid{background:#2980b9;color:#0a2a40} .fwd{background:#e74c3c;color:#4a0d09}
  .p-name{font-size:12px;font-weight:600;color:var(--text)}
  .p-pos{font-size:10px;color:var(--text2);margin-top:1px}
  .pc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .pc.pending{opacity:.5}
  .pc.tonight{border-color:var(--gold)}
  .pc-info{flex:1;min-width:0}
  .pc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pc-detail{font-size:10px;color:var(--text2);margin-top:2px}
  .pc-next{font-size:10px;color:var(--accent);margin-top:2px}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}
  .error-box{background:rgba(231,76,60,.1);border:1px solid var(--red);border-radius:12px;padding:14px;color:var(--red);font-size:12px;line-height:1.6}
  .setup-box{background:rgba(245,200,66,.08);border:1px solid var(--gold);border-radius:12px;padding:14px;font-size:12px;color:var(--text2);line-height:1.8}
  .setup-box strong{color:var(--gold)}
  .stats-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.stats-panel{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:70vh;overflow-y:auto}
.stats-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stats-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;margin:0 8px;overflow:hidden}
.stats-bar-fill{height:100%;background:var(--accent);border-radius:3px}
  .live-banner{background:linear-gradient(135deg,#c0392b,#e74c3c);color:white;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;cursor:pointer}
.live-dot{width:8px;height:8px;border-radius:50%;background:white;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">⚽</div>
      <div>
        <div class="header-title">Fantasy World Cup 2026</div>
        <div class="header-sub">Mondi Bar-On</div>
      </div>
      <div class="updated" id="updated-chip">Loading...</div>
    </div>
    <div class="tabs">
      <button class="tab" onclick="show('yesterday')">Yesterday</button>
      <button class="tab" onclick="show('today')">Tonight</button>
      <button class="tab" onclick="show('schedule')">Schedule</button> <button class="tab" onclick="show('upcoming')">My Players</button>
    </div>
  </div>

  <div class="content">
    <div id="yesterday"><div class="loading"><div class="spin"></div><br>Loading data...</div></div>
    <div id="today" style="display:none"><div class="loading"><div class="spin"></div><br>Loading data...</div></div>
    <div id="schedule" style="display:none"><div class="loading"><div class="spin"></div><br>Loading...</div></div> <div id="upcoming" style="display:none"><div class="loading"><div class="spin"></div><br>Loading data...</div></div>
  </div>
</div>

<script>
// ============================================================
// IMPORTANT: Paste your Google Drive JSON file ID below
// after setting up the Apps Script and sharing the file
// ============================================================
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQlzKxB3L8JwoeHTzn97cvBF4PSDv7wY-86P5-rW6SrA-A1Cobtr65pH9quHCE9eTE/exec"; // <- paste file ID here e.g. "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"

var FLAGS = {
  MEX:"🇲🇽",RSA:"🇿🇦",KOR:"🇰🇷",CZE:"🇨🇿",CAN:"🇨🇦",BIH:"🇧🇦",USA:"🇺🇸",PAR:"🇵🇾",
  NED:"🇳🇱",JPN:"🇯🇵",GER:"🇩🇪",BEL:"🇧🇪",EGY:"🇪🇬",URU:"🇺🇾",CPV:"🇨🇻",ARG:"🇦🇷",
  ALG:"🇩🇿",FRA:"🇫🇷",SEN:"🇸🇳",ENG:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",CRO:"🇭🇷",POR:"🇵🇹",COD:"🇨🇩",MAR:"🇲🇦",
  BRA:"🇧🇷",ESP:"🇪🇸",SAU:"🇸🇦",IRN:"🇮🇷",NZL:"🇳🇿",AUS:"🇦🇺",TUR:"🇹🇷",SUI:"🇨🇭",
  QAT:"🇶🇦",GHA:"🇬🇭",PAN:"🇵🇦",COL:"🇨🇴",UZB:"🇺🇿",SCO:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",HAI:"🇭🇹",NOR:"🇳🇴",
  IRQ:"🇮🇶",AUT:"🇦🇹",JOR:"🇯🇴",SWE:"🇸🇪",TUN:"🇹🇳",CUW:"🇨🇼",IVC:"🇨🇮",ECU:"🇪🇨",CPE:"🇨🇻"
};

function flag(nat){ return FLAGS[nat] || "🏳️"; }

function posClass(pos){ return {GK:"gk",DEF:"def",MID:"mid",FWD:"fwd"}[pos]||"mid"; }

function initials(name){ return name.split(" ").map(function(w){return w[0]}).join("").slice(0,2).toUpperCase(); }

function formatTimeIL(utcDate){
  try{
    var d = new Date(utcDate);
    return d.toLocaleTimeString("en-IL",{timeZone:"Asia/Jerusalem",hour:"2-digit",minute:"2-digit",hour12:false});
  }catch(e){ return "?:??"; }
}

function show(tab){
  ["yesterday","today","schedule","upcoming"].forEach(function(id){
    document.getElementById(id).style.display = id===tab?"block":"none";
  });
  document.querySelectorAll(".tab").forEach(function(t){
    var tabName = t.getAttribute("onclick").match(/'([^']+)'/)[1];
    t.classList.toggle("on", tabName===tab);
  });
}

function renderYesterday(matches){
  if(!matches||matches.length===0) return '<div style="color:var(--text2);font-size:13px;padding:20px 0">No matches yesterday</div>';
  var h = '<div class="sec">Yesterday\'s Results</div>';
  matches.forEach(function(m){
    var mine = m.hasMine;
    h += '<div class="mc'+(mine?" mine":"")+'" onclick="showStats(\''+m.matchId+'\',\''+m.home+'\',\''+m.away+'\')" style="cursor:pointer">';
    if(mine) h += '<div class="badge badge-blue">YOUR PLAYERS HERE</div>';
    h += '<div class="teams">';
    h += '<div class="tm"><div style="font-size:22px">'+flag(m.homeNat)+'</div><div class="tm-nat">'+m.homeNat+'</div><div class="tm-name">'+m.home+'</div></div>';
    h += '<div class="sc"><div class="sc-num">'+(m.homeScore!==null?m.homeScore+' – '+m.awayScore:'–')+'</div><div class="sc-lbl">Full Time</div></div>';
    h += '<div class="tm"><div style="font-size:22px">'+flag(m.awayNat)+'</div><div class="tm-nat">'+m.awayNat+'</div><div class="tm-name">'+m.away+'</div></div>';
    h += '</div>';
    if(m.goals&&m.goals.length>0){
      h += '<div class="events">';
      m.goals.forEach(function(g){ h += '<div class="ev"><span class="dot dot-g"></span>'+g+'</div>'; });
      if(m.cards) m.cards.forEach(function(c){ h += '<div class="ev"><span class="dot dot-r"></span>'+c+'</div>'; });
      h += '</div>';
    }
    if(mine&&m.myPlayers&&m.myPlayers.length>0){
      h += '<div class="my-ps">';
      m.myPlayers.forEach(function(p){
        var pts = p.fantasyPoints !== undefined ? p.fantasyPoints : '—';
        var ptsColor = pts > 5 ? '#00c896' : pts < 0 ? '#e74c3c' : 'var(--text)';
        h += '<div class="my-p" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div class="av '+posClass(p.pos)+'">'+initials(p.name)+'</div><div><div class="p-name">'+p.name+'</div><div class="p-pos">'+p.pos+(p.breakdown ? ' · '+p.breakdown : '')+'</div></div></div><div style="font-size:16px;font-weight:700;color:'+ptsColor+'">'+pts+'<span style="font-size:9px;color:var(--text2)"> pts</span></div></div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

function renderToday(matches){
  if(!matches||matches.length===0) return '<div style="color:var(--text2);font-size:13px;padding:20px 0">No matches tonight</div>';
  
  var sorted = matches.slice().sort(function(a,b){ return new Date(a.utcDate)-new Date(b.utcDate); });
  
  var h = '<div class="sec">Tonight\'s Matches</div>';
  sorted.forEach(function(m){
    var scoreOrTime = (m.isLive || m.homeScore !== null) ? m.homeScore+' - '+m.awayScore : formatTimeIL(m.utcDate);
    var clockLabel = m.isLive ? '[LIVE] '+m.clock : m.homeScore !== null ? 'Full Time' : 'Israel Time';
    var isMine = m.hasMine;
    
    h += '<div class="mc'+(isMine?' today-mine':'')+'" onclick="showStats(\''+m.matchId+'\',\''+m.home+'\',\''+m.away+'\')" style="cursor:pointer">';
    if(isMine) h += '<div class="badge badge-green">YOUR PLAYER IS PLAYING</div>';
    h += '<div class="teams">';
    h += '<div class="tm"><div style="font-size:22px">'+flag(m.homeNat)+'</div><div class="tm-nat">'+m.homeNat+'</div><div class="tm-name">'+m.home+'</div></div>';
    h += '<div class="sc"><div class="sc-time">'+scoreOrTime+'</div><div class="sc-il">'+clockLabel+'</div></div>';
    h += '<div class="tm"><div style="font-size:22px">'+flag(m.awayNat)+'</div><div class="tm-nat">'+m.awayNat+'</div><div class="tm-name">'+m.away+'</div></div>';
    h += '</div>';
    
    if(isMine && m.myPlayers && m.myPlayers.length>0){
      h += '<div class="my-ps">';
      m.myPlayers.forEach(function(p){
        var lineupIcon = p.lineup==="starting" ? " ✅ Starting" : p.lineup==="bench" ? " 🔶 Bench" : "";
        var pts = p.fantasyPoints !== undefined ? p.fantasyPoints : '—';
        var ptsColor = pts > 5 ? '#00c896' : pts < 0 ? '#e74c3c' : 'var(--text)';
        h += '<div class="my-p" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><div class="av '+posClass(p.pos)+'">'+initials(p.name)+'</div><div><div class="p-name">'+p.name+'</div><div class="p-pos">'+p.pos+lineupIcon+'</div></div></div><div style="font-size:16px;font-weight:700;color:'+ptsColor+'">'+pts+'<span style="font-size:9px;color:var(--text2)"> pts</span></div></div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  return h;
}

function getTotalPoints(myTeam, yesterdayMatches, todayMatches) {
  var totals = {};
  if (!myTeam) return totals;
  myTeam.forEach(function(p) { totals[p.name] = { points: 0, played: 0 }; });
  
  var seenMatchIds = {};
  var allMatches = (yesterdayMatches || []).concat(todayMatches || []);
  allMatches.forEach(function(m) {
    if (!m.myPlayers) return;
    if (seenMatchIds[m.matchId]) return;
    seenMatchIds[m.matchId] = true;
    m.myPlayers.forEach(function(p) {
      if (p.fantasyPoints !== undefined) {
        if (!totals[p.name]) totals[p.name] = { points: 0, played: 0 };
        totals[p.name].points += p.fantasyPoints;
        totals[p.name].played += 1;
      }
    });
  });
  return totals;
}
function renderUpcoming(matches, myTeam, yesterdayMatches, todayMatches, historicalPoints){
  var totalPts = 0;
  if(historicalPoints) {
    Object.keys(historicalPoints).forEach(function(name) {
      totalPts += historicalPoints[name] || 0;
    });
  }
  var h = '<div style="background:linear-gradient(135deg,#1e3a5f,#0a2040);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:var(--text2)">Total Fantasy Points</div><div style="font-size:10px;color:var(--text2);margin-top:3px">Tournament so far</div></div><div style="font-size:36px;font-weight:800;color:#00c896">'+totalPts+'</div></div>';
  h += '<div class="sec">Your Players — Next Matches</div>';
  if(!myTeam) return h;
  var totals = {};
myTeam.forEach(function(p) {
  totals[p.name] = { points: historicalPoints ? (historicalPoints[p.name] || 0) : 0, played: 0 };
});
  myTeam.forEach(function(player){
    var nextMatch = null;
    if(matches){
      for(var i=0;i<matches.length;i++){
        var m = matches[i];
        if(m.homeNat===player.nat||m.awayNat===player.nat){
          nextMatch = m;
          break;
        }
      }
    }
    var tonight = nextMatch && isTonight(nextMatch.utcDate);
    var playerTotal = totals[player.name] || { points: 0, played: 0 };
    var ptsColor = playerTotal.points > 5 ? '#00c896' : playerTotal.points < 0 ? '#e74c3c' : 'var(--text2)';
    h += '<div class="pc'+(tonight?" tonight":" pending")+'">';
    h += '<div class="av '+posClass(player.pos)+'">'+initials(player.name)+'</div>';
    h += '<div class="pc-info">';
    h += '<div class="pc-name">'+player.name+'</div>';
    h += '<div class="pc-detail">'+player.pos+' &bull; '+flag(player.nat)+' '+player.nat+'</div>';
    if(nextMatch){
      var opp = nextMatch.homeNat===player.nat ? nextMatch.away : nextMatch.home;
      var oppNat = nextMatch.homeNat===player.nat ? nextMatch.awayNat : nextMatch.homeNat;
      var matchDate = new Date(nextMatch.utcDate).toLocaleDateString("en-IL",{timeZone:"Asia/Jerusalem",day:"2-digit",month:"2-digit"});
h += '<div class="pc-next">'+(tonight?"TONIGHT ⚡":"Next: ")+' '+matchDate+' '+formatTimeIL(nextMatch.utcDate)+' vs '+flag(oppNat)+' '+opp+'</div>';
    } else {
      h += '<div class="pc-next" style="color:var(--text2)">No upcoming match found</div>';
    }
    h += '</div>';
    h += '<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:800;color:'+ptsColor+'">'+playerTotal.points+'</div><div style="font-size:9px;color:var(--text2)">pts</div></div>';
    h += '</div>';
  });
  return h;
}

function isTonight(utcDate){
  try{
    var matchDate = new Date(utcDate).toLocaleDateString("en-IL",{timeZone:"Asia/Jerusalem"});
    var todayDate = new Date().toLocaleDateString("en-IL",{timeZone:"Asia/Jerusalem"});
    return matchDate === todayDate;
  }catch(e){ return false; }
}

function loadData(){
  if(!SCRIPT_URL){
    var setupMsg = '<div class="setup-box"><strong>Setup needed:</strong><br>1. Run the Apps Script (setupDailyTrigger)<br>2. Find "mundial_data.json" in Google Drive<br>3. Share it as "Anyone with link can view"<br>4. Copy the file ID from the URL<br>5. Paste it in this HTML file (DRIVE_FILE_ID variable)</div>';
    document.getElementById("yesterday").innerHTML = setupMsg;
    document.getElementById("today").innerHTML = setupMsg;
    document.getElementById("upcoming").innerHTML = setupMsg;
    document.getElementById("updated-chip").textContent = "Setup needed";
    return;
  }

  var url = SCRIPT_URL;

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var updated = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString("en-IL",{timeZone:"Asia/Jerusalem",hour:"2-digit",minute:"2-digit"}) : "?";
      document.getElementById("updated-chip").textContent = "Updated " + updated;

      var allUpcoming = (data.todayMatches||[]).concat(data.upcomingMatches||[]);

      document.getElementById("yesterday").innerHTML = renderYesterday(data.yesterdayMatches);
      document.getElementById("today").innerHTML = renderToday(data.todayMatches);
      checkUpcomingMatch(data.todayMatches);
      checkLiveMatches(data.todayMatches);
      document.getElementById("schedule").innerHTML = renderSchedule(data.yesterdayMatches, data.todayMatches, data.upcomingMatches);
     document.getElementById("upcoming").innerHTML = renderUpcoming(allUpcoming, data.myTeam, data.yesterdayMatches, data.todayMatches, data.historicalPoints);
    })
    .catch(function(e){
      var errMsg = '<div class="error-box"><strong>Could not load data</strong><br>Make sure the Google Drive file is shared as "Anyone with link can view"<br><br>Error: ' + e.message + '</div>';
document.getElementById("yesterday").innerHTML = errMsg;
document.getElementById("today").innerHTML = errMsg;
document.getElementById("upcoming").innerHTML = errMsg;
document.getElementById("schedule").innerHTML = errMsg;
    });
}
function showStats(matchId, home, away) {
  var modal = document.createElement('div');
  modal.className = 'stats-modal';
  modal.innerHTML = '<div class="stats-panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:14px;font-weight:700">'+home+' vs '+away+'</div><span onclick="this.closest(\'.stats-modal\').remove()" style="cursor:pointer;font-size:18px;color:var(--text2)">✕</span></div><div style="text-align:center;color:var(--text2);font-size:12px">Loading stats...</div></div>';
  document.body.appendChild(modal);

  fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event='+matchId)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var panel = modal.querySelector('.stats-panel');
      var stats = '';
      var teams = data.boxscore && data.boxscore.teams;
      if(teams && teams.length >= 2) {
        var homeStats = teams[0].statistics || [];
        var awayStats = teams[1].statistics || [];
        var show = ['possessionPct','totalShots','shotsOnTarget','wonCorners','foulsCommitted','yellowCards'];
        var labels = {'possessionPct':'Possession %','totalShots':'Shots','shotsOnTarget':'On Target','wonCorners':'Corners','foulsCommitted':'Fouls','yellowCards':'Yellow Cards'};
        homeStats.forEach(function(s) {
          if(show.indexOf(s.name) === -1) return;
          var aw = awayStats.find(function(a){ return a.name === s.name; });
          var hv = parseFloat(s.displayValue) || 0;
          var av = aw ? parseFloat(aw.displayValue) || 0 : 0;
          var total = hv + av || 1;
          stats += '<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--text2);text-align:center;margin-bottom:4px">'+(labels[s.name]||s.name)+'</div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:700;min-width:30px;text-align:right">'+s.displayValue+'</span><div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--accent);border-radius:3px;width:'+(hv/total*100)+'%"></div></div><span style="font-size:13px;font-weight:700;min-width:30px">'+(aw?aw.displayValue:'0')+'</span></div></div>';
        });
      }
      panel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:14px;font-weight:700">'+home+' vs '+away+'</div><span onclick="this.closest(\'.stats-modal\').remove()" style="cursor:pointer;font-size:18px;color:var(--text2)">✕</span></div><div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:12px;font-weight:700;color:var(--text2)">'+home+'</span><span style="font-size:12px;font-weight:700;color:var(--text2)">'+away+'</span></div>'+(stats||'<div style="color:var(--text2);font-size:12px;text-align:center">No stats available</div>');
    });
}
 function renderSchedule(yesterdayMatches, todayMatches, upcomingMatches) {
  var now = new Date().getTime(); var all = (todayMatches||[]).concat(upcomingMatches||[]).filter(function(m) {   return new Date(m.utcDate).getTime() >= now - 2*60*60*1000; });
  if(!all.length) return '<div style="color:var(--text2);padding:20px 0">No matches found</div>';
  var byDate = {};
  all.forEach(function(m) {
    var date = new Date(m.utcDate).toLocaleDateString("en-IL",{timeZone:"Asia/Jerusalem",day:"2-digit",month:"2-digit",weekday:"short"});
    if(!byDate[date]) byDate[date] = [];
    byDate[date].push(m);
  });
  var h = '';
  Object.keys(byDate).forEach(function(date) {
    h += '<div class="sec">'+date+'</div>';
    byDate[date].forEach(function(m) {
      var isMine = m.hasMine;
      var scoreOrTime = m.homeScore !== null ? m.homeScore+' - '+m.awayScore : formatTimeIL(m.utcDate);
      var label = m.isLive ? '🔴 '+m.clock : m.homeScore !== null ? 'FT' : formatTimeIL(m.utcDate);
      h += '<div class="mc'+(isMine?' mine':'')+'" onclick="showStats(\''+m.matchId+'\',\''+m.home+'\',\''+m.away+'\')" style="cursor:pointer;padding:8px 12px">';
      h += '<div style="display:flex;align-items:center;justify-content:space-between">';
      h += '<div style="flex:1;text-align:center"><div style="font-size:18px">'+flag(m.homeNat)+'</div><div style="font-size:11px;font-weight:700">'+m.home+'</div></div>';
      h += '<div style="text-align:center;min-width:70px"><div style="font-size:15px;font-weight:800;color:'+(m.isLive?'var(--red)':'var(--text)')+'">'+scoreOrTime+'</div><div style="font-size:9px;color:var(--text2)">'+label+'</div></div>';
      h += '<div style="flex:1;text-align:center"><div style="font-size:18px">'+flag(m.awayNat)+'</div><div style="font-size:11px;font-weight:700">'+m.away+'</div></div>';
      h += '</div>';
      if(isMine) {
        var names = m.myPlayers.map(function(p){return p.name.split(' ').pop();}).join(', ');
        h += '<div style="font-size:10px;color:var(--accent);text-align:center;margin-top:4px">⭐ '+names+'</div>';
      }
      h += '</div>';
    });
  });
  return h;
} 
// Auto-refresh every 5 minutes during live matches
setInterval(function() {
  var hasLive = document.getElementById('live-banner');
  if (hasLive) {
    loadData();
  }
}, 5 * 60 * 1000);
loadData();
function checkLiveMatches(todayMatches) {
  if (!todayMatches) return;
  var existing = document.getElementById('live-banner');
  if (existing) existing.remove();
  todayMatches.forEach(function(m) {
    if (!m.isLive || !m.hasMine) return;
    var players = m.myPlayers.map(function(p) { return p.name.split(' ').pop(); }).join(', ');
    var banner = document.createElement('div');
    banner.id = 'live-banner';
    banner.className = 'live-banner';
    banner.onclick = function() { show('today'); };
    banner.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><div class="live-dot"></div>LIVE ' + m.clock + '</div><div>' + m.home + ' ' + (m.homeScore||0) + ' - ' + (m.awayScore||0) + ' ' + m.away + '</div><div style="opacity:0.8;font-size:10px">' + players + '</div>';
    document.querySelector('.header').prepend(banner);
  });
}
function checkUpcomingMatch(todayMatches) {
  if (!todayMatches) return;
  var now = new Date().getTime();
  todayMatches.forEach(function(m) {
    if (!m.hasMine) return;
    var matchTime = new Date(m.utcDate).getTime();
    var minutesUntil = (matchTime - now) / (1000 * 60);
    if (minutesUntil > 0 && minutesUntil <= 60) {
      showMatchAlert(m, Math.round(minutesUntil));
    }
  });
}

function showMatchAlert(m, minutesUntil) {
  var existing = document.getElementById('match-alert');
  if (existing) return;
  var players = m.myPlayers.map(function(p) { return p.name; }).join(', ');
  var alert = document.createElement('div');
  alert.id = 'match-alert';
  alert.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#00c896;color:white;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:700;z-index:999;max-width:340px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.4)';
  alert.innerHTML = '⚡ Match in ' + minutesUntil + ' min!<br><span style="font-weight:400;font-size:11px">' + players + ' — ' + m.home + ' vs ' + m.away + '</span><br><span onclick="document.getElementById(\'match-alert\').remove()" style="font-size:10px;opacity:0.7;cursor:pointer">✕ dismiss</span>';
  document.body.appendChild(alert);
}
